<html>
  <head>
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <head>
    <title>Document</title>
    <link  type="image/png" href="./img/android-chrome-192x192.png" rel="icon"/>
    <link rel="stylesheet" href="style.css" />
  </head>
  <d class="form-body">
    <div class="headerform">
      <h2>Book Your Spot</h2>
      <p>Fill out the form below and we will secure your parking space.</p>
    </div>
    <div class="form-box">
      <form>
        <table style="width: 80%; border-spacing: 0 25px">
          <tr>
            <td><label for="name">First Name :</label></td>
            <td>
              <input
                type="text"
                id="name"
                name="first name"
                placeholder="Ex: Mohamed"
                required
              />
            </td>
          </tr>

          <tr>
            <td><label for="name">Last Name :</label></td>
            <td>
              <input
                type="text"
                id="name"
                name="last name"
                placeholder="Ex: Ahmed"
                required
              />
            </td>
          </tr>

          <tr>
            <td><label for="email">Email Address :</label></td>
            <td>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="user@gmail.com"
                required
              />
            </td>
          </tr>

          <tr>
            <td><label for="phone">Phone :</label></td>
            <td>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="+201011***657"
                required
              />
            </td>
          </tr>

          <tr>
            <td><label>Book From :</label></td>
            <td><input type="time" name="book_from" required /></td>
          </tr>

          <tr>
            <td><label>Book To :</label></td>
            <td><input type="time" name="book_to" required /></td>
          </tr>

          <tr>
            <td style="vertical-align: top">
              <label for="notes">Additional Notes :</label>
            </td>
            <td>
              <textarea
                id="notes"
                name="notes"
                placeholder="Any special requests?"
                rows="5"
                style="width: 100%"
              ></textarea>
            </td>
          </tr>
        </table>

        <button type="submit" class="submit">Submit</button>
      </form>
    </div>
    <div class="contact">
  <p>Need help? <a href="https://wa.me/201005121073" target="_blank">Chat on WhatsApp</a></p>
</div>
</div>

</html>
